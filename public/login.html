<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Adota Patas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .fundo {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .fundo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fundo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.30);
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.40);
      border-radius: 20px;
      padding: 48px 42px 36px;
      width: 380px;
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.30);
      animation: slideDown 1.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes slideDown {
      0%   { transform: translateY(-120vh); opacity: 0; }
      80%  { opacity: 1; }
      90%  { transform: translateY(14px); }
      100% { transform: translateY(0); opacity: 1; }
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .logo img {
      width: 160px;
      height: auto;
      object-fit: contain;
    }

    .field {
      position: relative;
      margin-bottom: 14px;
    }

    .field svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: rgba(255,255,255,0.85);
      fill: none;
      stroke-width: 1.8;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: rgba(255, 255, 255, 0.20);
      border: 1.5px solid rgba(255, 255, 255, 0.50);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.5px;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .field input::placeholder {
      color: rgba(255, 255, 255, 0.80);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .field input:focus {
      border-color: #ff6b35;
      background: rgba(255, 255, 255, 0.28);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #fff;
      color: #333;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.20);
    }

    .btn-login:hover {
      background: #ff6b35;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.45);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* ── Links com estilo de botão pequeno ── */
    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      gap: 10px;
    }

    .links a {
      flex: 1;
      text-align: center;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      color: #ff6b35;
      text-decoration: none;
      border: 1.5px solid rgba(255, 107, 53, 0.55);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.10);
      transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
    }

    .links a:hover {
      background: #ff6b35;
      color: #fff;
      border-color: #ff6b35;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="fundo">
    <img src="assets/download.png" alt="fundo">
  </div>

  <div class="card">

    <div class="logo">
      <img src="assets/logoc2.png" alt="logo" />
    </div>

    <div class="field">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <input type="text" placeholder="Usuário" autocomplete="username"/>
    </div>

    <div class="field">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input type="password" placeholder="Senha" autocomplete="current-password"/>
    </div>

    <button class="btn-login">Login</button>

    <div class="links">
      <a href="#">Registre-se</a>
      <a href="#">Esqueci minha senha</a>
    </div>

  </div>

</body>
</html>
